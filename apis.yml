aid: frankford-candy
name: Frankford Candy
description: >-
  Frankford Candy & Chocolate Company is a privately held, family-owned
  confectionery manufacturer headquartered in the Frankford neighborhood of
  Philadelphia, Pennsylvania. Founded in 1947 by Russian immigrant Sam
  Himmelstein, the company describes itself as the "#1 Marketer of Licensed
  Confectionary in the United States," producing licensed novelty candy,
  holiday plush, hot chocolate bombs, gummies, Valentine heart boxes, and
  seasonal collectibles under partnerships with M&M's, Hershey, Pez, Oreo,
  Sour Patch Kids, Peeps, Welch's, Jif, Kraft, Disney, Marvel, Netflix,
  Nickelodeon, Minecraft, Super Mario, SpongeBob, Stitch, Care Bears, Elf on
  the Shelf, Baskin-Robbins, Dunkin', KFC, and Smucker's. Frankford acquired
  the Cap Candy and Wonder Ball lines from Hasbro and Nestlé in the 2000s
  and is one of the largest producers of chocolate Easter rabbits in the
  United States. This repository captures the publicly observable web
  surface for Frankford Candy; the company exposes no public developer API,
  portal, SDK, status page, or machine-readable artifacts.
